# =============================================================
#  TaskFlow Pro — Prometheus Configuration
# =============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'taskflow-monitor'

scrape_configs:
  # ── App Next.js ───────────────────────────────────────────
  - job_name: 'taskflow-app'
    static_configs:
      - targets: ['app:3000']
    metrics_path: '/api/metrics'
    scheme: http

  # ── PostgreSQL ────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  # ── Redis ─────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  # ── Prometheus mismo ──────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
